<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="background">
            <div class="shade"></div>
            <div class="shade"></div>
        </div>
        <form>
            <h3>Register Here</h3>

            <div class="inputgroup">
                <div>
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name" placeholder="Enter Name" required>
                </div>
                
                <div>
                    <label for="usn">USN</label>
                    <input type="text" name="usn" id="usn" placeholder="Enter USN" required>
                </div>   
            </div>

            <div class="inputgroup">
                <div> 
                     <label for="college">College</label>
                    <input type="text" name="college" id="college" placeholder="Enter College" required>
                </div>
               
                <div>
                    <label for="department">Department</label>
                    <input type="text" name="department" id="department" placeholder="Enter department" required>
                </div>
            </div>

            <div class="inputgroup">
                <div>
                    <label for="phone">Phone</label>
                    <input type="number" name="phone" id="phone" placeholder="Enter phone" required>
                </div>

                <div>
                    <label for="address">Address</label>
                    <input type="text" name="address" id="address" placeholder="Enter Address" required>
                </div>
            </div>

            <div class="inputgroup">
                <div>
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="Enter Email" required>
                </div>
                
                <div>
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="Password" required>
                </div>

            </div>

        
            <button type="submit" id="button">Sign Up</button>

            <p>Do Have on Account? <a href="/login.html">LogIn Here</a></p>
        </form>
    </div>

    <script type="module" src="register.js"></script>
</body>
</html>
